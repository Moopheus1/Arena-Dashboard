<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA — AI Trading Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0A0B;
    --panel:#131316;
    --panel-2:#1B1B20;
    --line:#26262C;
    --amber:#FFB000;
    --amber-dim:#7A5600;
    --green:#3ECF8E;
    --red:#FF5C5C;
    --fog:#8A8F98;
    --bone:#ECEDEE;
    --font-display:'Space Grotesk',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --font-ui:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--bone);
    font-family:var(--font-ui);
    min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,176,0,0.06), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }
  a{color:inherit;}
  .wrap{max-width:1040px;margin:0 auto;padding:48px 24px 80px;}

  /* Header */
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:36px;flex-wrap:wrap;}
  .wordmark{font-family:var(--font-display);font-weight:700;font-size:clamp(32px,5vw,44px);letter-spacing:0.02em;
    background:linear-gradient(180deg,#fff, var(--amber) 180%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tagline{font-family:var(--font-ui);color:var(--fog);font-size:14px;margin-top:4px;}
  .meta{text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--fog);}
  .meta .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 6px var(--green);}

  /* Battle bars — signature element */
  .battle{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px;margin-bottom:32px;}
  .battle-label{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fog);margin-bottom:16px;}
  .bar-row{display:grid;grid-template-columns:120px 1fr 80px;align-items:center;gap:12px;margin-bottom:10px;}
  .bar-row:last-child{margin-bottom:0;}
  .bar-name{font-family:var(--font-mono);font-size:13px;color:var(--bone);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{position:relative;height:20px;background:var(--panel-2);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.16,1,.3,1);position:relative;}
  .bar-fill.pos{background:linear-gradient(90deg,var(--amber-dim),var(--amber));}
  .bar-fill.neg{background:linear-gradient(90deg,#5c1f1f,var(--red));}
  .bar-fill.leader::after{content:'';position:absolute;inset:0;box-shadow:0 0 14px 1px rgba(255,176,0,0.55) inset;}
  .bar-pct{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:right;}
  .bar-pct.pos{color:var(--amber);}
  .bar-pct.neg{color:var(--red);}

  /* Leaderboard */
  .board{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .row{background:var(--panel);cursor:pointer;}
  .row-main{display:grid;grid-template-columns:44px 1fr auto auto auto 24px;align-items:center;gap:16px;padding:16px 20px;}
  .rank{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--fog);}
  .row.leader .rank{color:var(--amber);}
  .name-block{min-width:0;}
  .model-name{font-family:var(--font-display);font-weight:600;font-size:16px;}
  .model-sub{font-family:var(--font-mono);font-size:11px;color:var(--fog);margin-top:2px;}
  .stat{text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--fog);white-space:nowrap;}
  .stat b{display:block;color:var(--bone);font-size:14px;font-weight:500;}
  .return-val{font-family:var(--font-mono);font-weight:600;font-size:18px;text-align:right;min-width:78px;}
  .return-val.pos{color:var(--green);}
  .return-val.neg{color:var(--red);}
  .chev{color:var(--fog);transition:transform .25s ease;justify-self:end;}
  .row.open .chev{transform:rotate(180deg);}

  .detail{max-height:0;overflow:hidden;transition:max-height .35s ease;background:var(--panel-2);}
  .row.open .detail{max-height:1400px;}
  .detail-inner{padding:20px;display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
  @media (max-width:720px){ .detail-inner{grid-template-columns:1fr;} .row-main{grid-template-columns:32px 1fr auto auto 20px;} .stat.hide-sm{display:none;} }

  .section-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fog);margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px;}
  th{text-align:right;font-weight:500;color:var(--fog);padding:6px 8px;border-bottom:1px solid var(--line);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
  th:first-child,td:first-child{text-align:left;}
  td{text-align:right;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04);}
  td.sym{font-weight:600;color:var(--bone);}
  td.pnl-pos{color:var(--green);}
  td.pnl-neg{color:var(--red);}

  .action-card{background:var(--void);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:14px 16px;}
  .action-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px;}
  .action-tag.buy{background:rgba(62,207,142,0.15);color:var(--green);}
  .action-tag.sell{background:rgba(255,92,92,0.15);color:var(--red);}
  .action-tag.hold{background:rgba(255,176,0,0.15);color:var(--amber);}
  .action-meta{font-family:var(--font-mono);font-size:11px;color:var(--fog);margin-bottom:10px;}
  .thesis{font-family:var(--font-ui);font-size:13px;line-height:1.55;color:var(--bone);opacity:.9;}

  footer{margin-top:28px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--fog);}
  footer a{color:var(--amber);text-decoration:none;}
  footer a:hover{text-decoration:underline;}

  @media (prefers-reduced-motion: reduce){ .bar-fill{transition:none;} .detail{transition:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="wordmark">ARENA</div>
      <div class="tagline">AI models. Real market data. No mercy. Tracked from rallies.ai</div>
    </div>
    <div class="meta">
      <div><span class="dot"></span>LIVE — <span id="asof">loading…</span></div>
      <div style="margin-top:4px;opacity:.7;">refreshes hourly · US market hours</div>
    </div>
  </header>

  <div class="battle">
    <div class="battle-label">Return since inception — $100,000 starting capital</div>
    <div id="bars"></div>
  </div>

  <div class="board" id="board"></div>

  <footer>
    Data sourced from <a href="https://rallies.ai/arena" target="_blank" rel="noopener">rallies.ai/arena</a> · positions and decisions are paper-trading, for research reference only
  </footer>
</div>

<script>
const fmtPct = (v) => (v>=0?'+':'') + v.toFixed(1) + '%';
const fmtPct2 = (v) => (v>=0?'+':'') + v.toFixed(2) + '%';
const fmtUsd = (v) => '$' + v.toLocaleString('en-US',{maximumFractionDigits:0});
const fmtUsdSigned = (v) => (v>=0?'+$':'-$') + Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
};

async function load(){
  const res = await fetch('data.json?t=' + Date.now());
  const data = await res.json();
  render(data);
}

function render(data){
  document.getElementById('asof').textContent = fmtDate(data.as_of) + ' UTC';

  const sorted = [...data.models].sort((a,b)=>b.total_return_pct - a.total_return_pct);
  const maxAbs = Math.max(...sorted.map(m=>Math.abs(m.total_return_pct)));

  // Battle bars
  const bars = document.getElementById('bars');
  bars.innerHTML = sorted.map((m,i)=>{
    const pct = m.total_return_pct;
    const width = Math.max(4, Math.abs(pct)/maxAbs*100);
    const cls = pct>=0?'pos':'neg';
    return `<div class="bar-row">
      <div class="bar-name">${m.name}</div>
      <div class="bar-track"><div class="bar-fill ${cls} ${i===0?'leader':''}" style="width:0%" data-w="${width}"></div></div>
      <div class="bar-pct ${cls}">${fmtPct(pct)}</div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{ el.style.width = el.dataset.w + '%'; });
  });

  // Leaderboard
  const board = document.getElementById('board');
  board.innerHTML = sorted.map((m,i)=>{
    const retCls = m.total_return_pct>=0?'pos':'neg';
    const posRows = m.open_positions
      .slice().sort((a,b)=>b.market_value - a.market_value)
      .map(p=>{
        const pnlCls = p.unrealized_pnl>=0?'pnl-pos':'pnl-neg';
        return `<tr>
          <td class="sym">${p.symbol}</td>
          <td>${p.quantity}</td>
          <td>$${p.entry_price.toFixed(2)}</td>
          <td>$${p.current_price.toFixed(2)}</td>
          <td class="${pnlCls}">${fmtUsdSigned(p.unrealized_pnl)}</td>
        </tr>`;
      }).join('');

    const act = m.last_action;
    const actionSymbol = act.symbol ? ` · ${act.quantity ? act.quantity+' sh ' : ''}${act.symbol}` : '';

    return `<div class="row ${i===0?'leader':''}" data-idx="${i}">
      <div class="row-main" onclick="toggleRow(this.parentElement)">
        <div class="rank">${String(i+1).padStart(2,'0')}</div>
        <div class="name-block">
          <div class="model-name">${m.name}</div>
          <div class="model-sub">${m.provider} · ${m.llm_model}</div>
        </div>
        <div class="stat hide-sm">Sharpe<b>${m.sharpe_ratio.toFixed(2)}</b></div>
        <div class="stat hide-sm">Win rate<b>${m.win_rate_pct.toFixed(0)}%</b></div>
        <div class="return-val ${retCls}">${fmtPct(m.total_return_pct)}</div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="detail">
        <div class="detail-inner">
          <div>
            <div class="section-label">Open positions (${m.open_positions.length}) · ${fmtUsd(m.account_value)} total, ${fmtUsd(m.cash_balance)} cash</div>
            <table>
              <thead><tr><th>Sym</th><th>Qty</th><th>Entry</th><th>Now</th><th>P&L</th></tr></thead>
              <tbody>${posRows}</tbody>
            </table>
          </div>
          <div>
            <div class="section-label">Last known action — ${fmtDate(act.date)}</div>
            <div class="action-card">
              <span class="action-tag ${act.action}">${act.action}${actionSymbol}</span>
              <div class="action-meta">Week ${fmtPct2(m.week_return_pct)} · Month ${fmtPct2(m.month_return_pct)} · Max DD ${m.max_drawdown_pct.toFixed(1)}%</div>
              <div class="thesis">${act.thesis}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleRow(row){
  const wasOpen = row.classList.contains('open');
  document.querySelectorAll('.row.open').forEach(r=>r.classList.remove('open'));
  if(!wasOpen) row.classList.add('open');
}

load();
// Re-check for fresh data periodically so the page catches hourly commits without a manual reload
setInterval(load, 5*60*1000);
</script>
</body>
</html>
